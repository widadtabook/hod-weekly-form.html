<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تنسيق تغطية الفعاليات — الكلية المهنية بصلالة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --teal:    #1a8fa0;
  --teal2:   #0d6e7e;
  --red:     #b03a2e;
  --gold:    #9a7d3a;
  --gold2:   #c4a24a;
  --white:   #ffffff;
  --cream:   #f8f6f2;
  --ink:     #1c1a17;
  --muted:   #6b6560;
  --border:  #ddd6cc;
  --light:   #e8f6f8;
  --err:     #c0392b;
  --success: #1a8f60;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Cairo',sans-serif; background:var(--cream); color:var(--ink); min-height:100vh; }
.stripe-bar { height:8px; background:linear-gradient(to left,var(--teal) 33%,var(--red) 33% 66%,var(--gold) 66%); }
.hero { position:relative; overflow:hidden; background:linear-gradient(135deg,var(--teal2) 0%,#0a4a55 60%,#1a2a35 100%); padding:2.5rem 2rem 5rem; text-align:center; }
.hero::before { content:''; position:absolute; bottom:-2px; left:0; right:0; height:70px; background:var(--cream); clip-path:ellipse(55% 100% at 50% 100%); }
.hero-badge { display:inline-block; background:rgba(196,162,74,.2); border:1px solid rgba(196,162,74,.5); color:var(--gold2); font-size:11px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; padding:.3rem 1.2rem; border-radius:2px; margin-bottom:.9rem; }
.hero h1 { font-family:'Tajawal',sans-serif; font-size:1.9rem; font-weight:900; color:#fff; margin-bottom:.4rem; text-shadow:0 2px 8px rgba(0,0,0,0.3); }
.hero p { color:rgba(255,255,255,.6); font-size:13px; }
.main { max-width:860px; margin:-1.5rem auto 3rem; padding:0 1.2rem; position:relative; z-index:1; }
.panel { background:#fff; border-radius:8px; box-shadow:0 4px 24px rgba(0,0,0,0.08); border:1px solid var(--border); overflow:hidden; margin-bottom:1.5rem; }
.panel-header { background:linear-gradient(to left,var(--teal),var(--teal2)); padding:.7rem 1.2rem; display:flex; align-items:center; gap:.6rem; }
.panel-header h3 { font-family:'Tajawal',sans-serif; font-size:13px; font-weight:800; color:#fff; }
.panel-body { padding:1.4rem; }
.info-grid { display:grid; grid-template-columns: 1fr 1fr 1fr; gap:1rem; }
@media(max-width:640px){ .info-grid { grid-template-columns:1fr; } }
.field-group { display:flex; flex-direction:column; gap:.35rem; }
.field-group label { font-size:12px; font-weight:700; color:var(--teal2); }
.req { color:var(--err); }
.field-group select, .field-group input { border:1.5px solid var(--border); border-radius:5px; padding:.6rem .85rem; font-family:'Cairo',sans-serif; font-size:13px; outline:none; width:100%; }

/* Event Cards */
.counter-bar { display:flex; align-items:center; gap:.8rem; background:var(--light); border:1px solid rgba(26,143,160,0.2); border-radius:5px; padding:.6rem 1rem; margin-bottom:1.2rem; font-size:13px; }
.event-card { background:#fff; border:1.5px solid var(--border); border-radius:8px; margin-bottom:1rem; overflow:hidden; }
.event-card-header { background:linear-gradient(to left,var(--light),#f0fafc); border-bottom:1px solid var(--border); padding:.55rem 1rem; display:flex; align-items:center; justify-content:space-between; }
.event-card-num { background:var(--teal2); color:#fff; font-size:11px; font-weight:800; padding:.15rem .65rem; border-radius:20px; }
.btn-del-card { background:none; border:none; cursor:pointer; color:#ccc; font-size:16px; }
.btn-del-card:hover { color:var(--err); }
.event-card-body { padding:1rem; }
.card-grid { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; }
.card-grid.three { grid-template-columns:1fr 1fr 1fr; }
@media(max-width:600px){ .card-grid.three, .card-grid { grid-template-columns:1fr; } }
.cfield { display:flex; flex-direction:column; gap:.3rem; margin-bottom: 5px; }
.cfield label { font-size:11px; font-weight:700; color:var(--teal2); }
.cfield input, .cfield select { border:1.5px solid var(--border); border-radius:5px; padding:.5rem .75rem; font-family:'Cairo',sans-serif; font-size:13px; outline:none; }
.card-divider { height:1px; background:var(--border); margin:.75rem 0; }
.btn-add { display:flex; align-items:center; gap:.5rem; background:none; border:1.5px dashed rgba(26,143,160,0.4); border-radius:6px; padding:.75rem 1.2rem; font-family:'Cairo',sans-serif; font-weight:700; color:var(--teal2); cursor:pointer; width:100%; justify-content:center; margin-bottom:1.5rem; }
.notes-field { border:1.5px solid var(--border); border-radius:5px; padding:.75rem .9rem; font-family:'Cairo',sans-serif; font-size:13px; width:100%; min-height:80px; outline:none; }
.submit-area { text-align:center; }
.btn-submit { background:linear-gradient(135deg,var(--teal),var(--teal2)); color:#fff; border:none; border-radius:6px; padding:.95rem 3rem; font-family:'Tajawal',sans-serif; font-size:16px; font-weight:800; cursor:pointer; box-shadow:0 4px 16px rgba(26,143,160,0.35); }
.btn-submit:disabled { background:#9eb3c8; cursor:not-allowed; }
.toast { display:none; align-items:center; gap:.7rem; padding:1rem 1.2rem; border-radius:5px; font-size:13px; font-weight:700; margin-top:1rem; }
.toast.success { background:#e8f5e9; border:1px solid #a5d6a7; color:var(--success); }
.toast.error { background:#fdecea; border:1px solid #f5c6c2; color:var(--err); }
.invalid { border-color:var(--err) !important; background:#fff5f5 !important; }
.footer { background:var(--ink); color:rgba(255,255,255,.45); text-align:center; font-size:11px; padding:1rem; margin-top:2rem; }
</style>
</head>
<body>

<div class="stripe-bar"></div>

<div class="hero">
  <div class="hero-badge">Events Coverage Coordination</div>
  <h1>تنسيق تغطية فعاليات الأقسام</h1>
  <p>أضف فعاليات قسمك وأرسلها دفعة واحدة لتنسيق التغطية الإعلامية</p>
</div>

<div class="main">
  <div class="panel">
    <div class="panel-header"><h3>معلومات القسم</h3></div>
    <div class="panel-body">
      <div class="info-grid">
        <div class="field-group">
          <label>الفصل الدراسي <span class="req">*</span></label>
          <select id="termSelect">
            <option value="">— اختر الفصل —</option>
            <option value="الفصل الأول">الفصل الأول</option>
            <option value="الفصل الثاني">الفصل الثاني</option>
            <option value="الفصل الثالث">الفصل الثالث</option>
          </select>
        </div>
        <div class="field-group">
          <label>القسم <span class="req">*</span></label>
          <select id="deptSelect">
            <option value="">— اختر القسم —</option>
            <option>قسم الدراسات التجارية</option>
            <option>قسم التصميم</option>
            <option>قسم اللغة الإنجليزية</option>
            <option>قسم المهارات الأساسية</option>
            <option>قسم سلامة وضبط جودة الأغذية البحرية</option>
            <option>قسم فن التجميل</option>
            <option>قسم هندسة الإلكترونيات</option>
            <option>قسم هندسة الطاقة</option>
            <option>قسم هندسة التبريد والتكييف</option>
            <option>قسم هندسة اللحام وتشكيل المعادن</option>
          </select>
        </div>
        <div class="field-group">
          <label>الأسبوع <span class="req">*</span></label>
          <select id="weekLabel">
            <option value="">— اختر الأسبوع —</option>
            <script>
              for(let i=1; i<=14; i++) document.write(`<option value="الأسبوع ${i}">الأسبوع ${i}</option>`);
            </script>
          </select>
        </div>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header"><h3>قائمة الفعاليات</h3></div>
    <div class="panel-body">
      <div class="counter-bar">
        <strong id="eventCount">0</strong> <span>فعالية مضافة</span>
      </div>
      <div id="eventsContainer"></div>
      <button class="btn-add" onclick="addCard()">+ إضافة فعالية جديدة</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header"><h3>ملاحظات إضافية</h3></div>
    <div class="panel-body">
      <textarea class="notes-field" id="generalNotes" placeholder="أي ملاحظات عامة..."></textarea>
    </div>
  </div>

  <div class="submit-area">
    <button class="btn-submit" id="submitBtn" onclick="submitForm()">إرسال البيانات للجدول</button>
    <div class="toast" id="toastSuccess">تم الإرسال بنجاح! ✅</div>
    <div class="toast" id="toastError"><span id="errorMsg">حدث خطأ ما</span></div>
  </div>
</div>

<div class="footer">الكلية المهنية بصلالة — وزارة العمل</div>

<script>
// ضعي رابط الـ Deployment ID الخاص بكِ هنا
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzwWWlDaGVhP1cLaYXIFH4yWd2VYuRF3NLV8VRVFykO9z25A6X5UcamLs2Tt43_2RlzYg/exec';

let cardCount = 0;

function addCard() {
  cardCount++;
  const div = document.createElement('div');
  div.className = 'event-card';
  div.innerHTML = `
    <div class="event-card-header">
      <span class="event-card-num">فعالية</span>
      <button class="btn-del-card" onclick="this.closest('.event-card').remove(); updateCounter();">✕</button>
    </div>
    <div class="event-card-body">
      <div class="cfield"><label>عنوان الفعالية *</label><input type="text" class="f-title"></div>
      <div class="card-grid three">
        <div class="cfield"><label>نوع الفعالية *</label>
          <select class="f-type"><option value="">اختر</option><option>داخلية</option><option>خارجية</option></select>
        </div>
        <div class="cfield"><label>التاريخ *</label><input type="date" class="f-date"></div>
        <div class="cfield"><label>الوقت (بدء - انتهاء) *</label>
          <div style="display:flex; gap:2px">
            <input type="time" class="f-start" style="padding:2px">
            <input type="time" class="f-end" style="padding:2px">
          </div>
        </div>
      </div>
      <div class="card-grid three">
        <div class="cfield"><label>مشرف الفعالية *</label><input type="text" class="f-supervisor"></div>
        <div class="cfield"><label>الفئة المستهدفة</label><input type="text" class="f-target"></div>
        <div class="cfield"><label>الضيوف / المنفذ</label><input type="text" class="f-guests"></div>
      </div>
      <div class="card-grid three">
        <div class="cfield"><label>المكان *</label><input type="text" class="f-venue"></div>
        <div class="cfield"><label>التغطية *</label>
          <select class="f-coverage"><option>بدون تغطية</option><option>صور</option><option>فيديو</option><option>كلاهما</option></select>
        </div>
        <div class="cfield"><label>اسم المصور</label><input type="text" class="f-photographer"></div>
      </div>
    </div>
  `;
  document.getElementById('eventsContainer').appendChild(div);
  updateCounter();
}

function updateCounter() {
  const count = document.getElementById('eventsContainer').children.length;
  document.getElementById('eventCount').textContent = count;
  const labels = document.querySelectorAll('.event-card-num');
  labels.forEach((l, i) => l.textContent = `فعالية ${i+1}`);
}

function submitForm() {
  const term = document.getElementById('termSelect').value;
  const dept = document.getElementById('deptSelect').value;
  const week = document.getElementById('weekLabel').value;
  
  if(!term || !dept || !week) { alert('يرجى إكمال بيانات القسم الأساسية'); return; }

  const cards = document.querySelectorAll('.event-card');
  const events = [];
  let valid = true;

  cards.forEach(c => {
    const data = {
      title: c.querySelector('.f-title').value,
      type: c.querySelector('.f-type').value,
      date: c.querySelector('.f-date').value,
      start: c.querySelector('.f-start').value,
      end: c.querySelector('.f-end').value,
      supervisor: c.querySelector('.f-supervisor').value,
      target: c.querySelector('.f-target').value,
      guests: c.querySelector('.f-guests').value,
      venue: c.querySelector('.f-venue').value,
      coverage: c.querySelector('.f-coverage').value,
      photographer: c.querySelector('.f-photographer').value
    };
    if(!data.title || !data.date) valid = false;
    events.push(data);
  });

  if(!valid || events.length === 0) { alert('يرجى التأكد من ملء بيانات الفعاليات'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'جاري الإرسال...';

  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    body: JSON.stringify({ term, dept, week, events, notes: document.getElementById('generalNotes').value })
  }).then(() => {
    document.getElementById('toastSuccess').style.display = 'block';
    setTimeout(() => location.reload(), 2000);
  }).catch(err => {
    alert('حدث خطأ في الاتصال');
    btn.disabled = false;
  });
}

addCard();
</script>
</body>
</html>
